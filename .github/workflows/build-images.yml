name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-main-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-backend:
    runs-on: ubuntu-latest
    needs: verify-main-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push clouisle-backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/dockerfiles/backend.Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-backend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-backend:latest

  build-sandbox-worker:
    runs-on: ubuntu-latest
    needs: verify-main-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push clouisle-sandbox-worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/dockerfiles/sandbox-worker.Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-sandbox-worker:${{ steps.version.outputs.VERSION }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-sandbox-worker:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: verify-main-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push clouisle-frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/dockerfiles/frontend.Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.VERSION }}
            NEXT_PUBLIC_BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clouisle-frontend:latest

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
