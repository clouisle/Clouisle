{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "clouisle.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  selector:
    {{- include "clouisle.selectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
