{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clouisle-ingress
  labels:
    {{- include "clouisle.componentLabels" (dict "root" . "component" "ingress") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ .paths.api.path }}
            pathType: {{ .paths.api.pathType }}
            backend:
              service:
                name: api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: {{ .paths.frontend.path }}
            pathType: {{ .paths.frontend.pathType }}
            backend:
              service:
                name: frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}
