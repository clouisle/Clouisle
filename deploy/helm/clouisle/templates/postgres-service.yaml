{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "clouisle.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "clouisle.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
