# =============================================================================
# Clouisle Docker Compose - App (Single Application Image)
# =============================================================================
# Frontend + Backend + Worker + Beat in one container
# Requires external databases (PostgreSQL, Redis, Qdrant)
#
# Usage:
#   docker-compose -f docker-compose.app.yml up -d
# =============================================================================

services:
  # Infrastructure Services
  db:
    image: postgres:16
    container_name: clouisle-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: clouisle-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: clouisle-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Service
  app:
    image: ghcr.io/yunhai-dev/clouisle:app
    container_name: clouisle-app
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      # Application
      PROJECT_NAME: ${PROJECT_NAME:-Clouisle}
      SECRET_KEY: ${SECRET_KEY:-changethis-to-a-secure-random-secret-key}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Database
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
      # External APIs (optional)
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/var/log/supervisor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
  logs_data:
