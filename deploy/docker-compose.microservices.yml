# =============================================================================
# Clouisle Docker Compose - Microservices (Separate Images)
# =============================================================================
# Frontend, Backend, Worker, Beat as separate containers
# Best for production deployments with independent scaling
#
# Usage:
#   docker-compose -f docker-compose.microservices.yml up -d
# =============================================================================

services:
  # Infrastructure Services
  db:
    image: postgres:16
    container_name: clouisle-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: clouisle-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: clouisle-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Services
  backend:
    image: ghcr.io/yunhai-dev/clouisle:backend
    container_name: clouisle-backend
    ports:
      - "8000:8000"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Clouisle}
      SECRET_KEY: ${SECRET_KEY:-changethis-to-a-secure-random-secret-key}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: ghcr.io/yunhai-dev/clouisle:worker
    container_name: clouisle-worker
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Clouisle}
      SECRET_KEY: ${SECRET_KEY:-changethis-to-a-secure-random-secret-key}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  beat:
    image: ghcr.io/yunhai-dev/clouisle:beat
    container_name: clouisle-beat
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Clouisle}
      SECRET_KEY: ${SECRET_KEY:-changethis-to-a-secure-random-secret-key}
      TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clouisle-redis-cbd3c07d}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-clouisle-qdrant-cbd3c07d}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/yunhai-dev/clouisle:frontend
    container_name: clouisle-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
