# =============================================================================
# Clouisle Kubernetes Deployment — Single-file manifest
# Apply:  kubectl apply -f deploy/k8s/clouisle.yaml
# =============================================================================
#
# IMPORTANT: Before applying, replace base64 placeholder values in the Secret.
#   echo -n 'your-value' | base64
#
# Replace image references with your registry, e.g.:
#   registry.cn-hangzhou.aliyuncs.com/clouisle/clouisle-backend:0.1.0

# ===========================================================================
# 1. Namespace
# ===========================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: clouisle

# ===========================================================================
# 2. ConfigMap — non-sensitive configuration
# ===========================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clouisle-config
  namespace: clouisle
data:
  PROJECT_NAME: "Clouisle"
  TIMEZONE: "Asia/Shanghai"
  API_BASE_URL: "http://api:8000"
  SANDBOX_ARTIFACT_UPLOAD_BASE_URL: "http://api:8000"
  SANDBOX_WORKER_CONCURRENCY: "1"
  FRONTEND_URL: "http://frontend:3000"
  POSTGRES_SERVER: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "clouisle"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  VECTOR_BACKEND: "qdrant"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION_PREFIX: "kb_dim"
  QDRANT_DISTANCE: "Cosine"
  BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'

# ===========================================================================
# 3. Secret — sensitive values (replace base64 placeholders!)
# ===========================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: clouisle-secret
  namespace: clouisle
type: Opaque
data:
  SECRET_KEY: Y2hhbmdldGhpcy10by1hLXNlY3VyZS1yYW5kb20tc2VjcmV0LWtleQ==   # changethis-to-a-secure-random-secret-key
  POSTGRES_PASSWORD: Y2hhbmdlbWU=   # changeme
  REDIS_PASSWORD: Y2hhbmdlbWU=      # changeme
  QDRANT_API_KEY: Y2hhbmdlbWU=      # changeme

# ===========================================================================
# 4. PostgreSQL — StatefulSet + Headless Service + PVC
# ===========================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: clouisle
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: clouisle
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: clouisle
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: clouisle-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: clouisle-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clouisle-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data

# ===========================================================================
# 5. Redis — Deployment + Service
# ===========================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: clouisle
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: clouisle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              if [ -n "$REDIS_PASSWORD" ]; then
                redis-server --requirepass "$REDIS_PASSWORD"
              else
                redis-server
              fi
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clouisle-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}

# ===========================================================================
# 6. Qdrant — StatefulSet + Headless Service + PVC
# ===========================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: clouisle
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: clouisle
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: clouisle
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: clouisle-secret
                  key: QDRANT_API_KEY
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qdrant-data

# ===========================================================================
# 7. Uploads — Shared PVC
#    Production multi-replica deployments require a ReadWriteMany-capable
#    StorageClass. Use single replicas or object storage if RWX is unavailable.
# ===========================================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-data
  namespace: clouisle
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 10Gi

# ===========================================================================
# 8. API — Deployment + Service
# ===========================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: clouisle
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: clouisle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: clouisle-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py", "server", "-H", "0.0.0.0", "-w", "4", "--no-reload"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: clouisle-config
            - secretRef:
                name: clouisle-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-data

# ===========================================================================
# 9. Worker — Deployment (no Service)
# ===========================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: clouisle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: clouisle-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py", "worker", "-c", "4", "-Q", "default,workflow"]
          envFrom:
            - configMapRef:
                name: clouisle-config
            - secretRef:
                name: clouisle-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-data

# ===========================================================================
# 10. Sandbox Worker — Deployment (no Service)
# ===========================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-worker
  namespace: clouisle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-worker
  template:
    metadata:
      labels:
        app: sandbox-worker
    spec:
      containers:
        - name: sandbox-worker
          image: clouisle-sandbox-worker:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - python main.py sandbox-worker -c "${SANDBOX_WORKER_CONCURRENCY:-1}"
          envFrom:
            - configMapRef:
                name: clouisle-config
            - secretRef:
                name: clouisle-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-data

# ===========================================================================
# 11. Beat — Deployment (single replica, Recreate)
# ===========================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: clouisle
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      containers:
        - name: beat
          image: clouisle-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py", "beat"]
          envFrom:
            - configMapRef:
                name: clouisle-config
            - secretRef:
                name: clouisle-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

# ===========================================================================
# 12. Frontend — Deployment + Service
# ===========================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: clouisle
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: clouisle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: clouisle-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

# ===========================================================================
# 13. Ingress
# ===========================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clouisle-ingress
  namespace: clouisle
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: clouisle.example.com    # Replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
