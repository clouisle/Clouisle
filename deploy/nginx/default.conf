server {
    listen 3000;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API proxy — forward to backend with full client info
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # i18n — pass language headers to backend
        proxy_set_header Accept-Language   $http_accept_language;
        proxy_set_header X-Language        $http_x_language;

        # WebSocket support (for streaming responses)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts for long-running LLM requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Disable buffering for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;

        # Allow large file uploads
        client_max_body_size 100m;
    }

    # Next.js static assets (immutable, long cache)
    location /_next/static/ {
        alias /app/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public static files
    location /public/ {
        alias /app/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon, robots, etc.
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        root /app/public;
        expires 7d;
        access_log off;
    }

    # All other requests — proxy to Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# WebSocket upgrade map (must be in http context)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
