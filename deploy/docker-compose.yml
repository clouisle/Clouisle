services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-clouisle}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    image: ${IMAGE_REGISTRY:-clouisle}-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/dockerfiles/backend.Dockerfile
    restart: unless-stopped
    command: ["python", "main.py", "server", "-H", "0.0.0.0", "-w", "4", "--no-reload"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
      SANDBOX_ARTIFACT_UPLOAD_BASE_URL: http://api:8000
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    image: ${IMAGE_REGISTRY:-clouisle}-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/dockerfiles/backend.Dockerfile
    restart: unless-stopped
    command: ["python", "main.py", "worker", "-c", "4", "-Q", "default,workflow"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
      SANDBOX_ARTIFACT_UPLOAD_BASE_URL: http://api:8000
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_started

  sandbox-worker:
    image: ${IMAGE_REGISTRY:-clouisle}-sandbox-worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/dockerfiles/sandbox-worker.Dockerfile
    restart: unless-stopped
    command: ["python", "main.py", "sandbox-worker", "-c", "${SANDBOX_WORKER_CONCURRENCY:-1}"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
      SANDBOX_ARTIFACT_UPLOAD_BASE_URL: http://api:8000
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_started

  beat:
    image: ${IMAGE_REGISTRY:-clouisle}-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/dockerfiles/backend.Dockerfile
    restart: unless-stopped
    command: ["python", "main.py", "beat"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
      SANDBOX_ARTIFACT_UPLOAD_BASE_URL: http://api:8000
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    image: ${IMAGE_REGISTRY:-clouisle}-frontend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/dockerfiles/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.0.0-dev}
        NEXT_PUBLIC_BUILD_DATE: ${NEXT_PUBLIC_BUILD_DATE:-unknown}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
